<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Midhun Soman — Business Development Executive. Digital business card and portfolio.">
  <meta name="theme-color" content="#0f172a">
  <meta name="og:title" content="Midhun Soman — Portfolio">

  <link rel="icon" href="favicon.svg">

<body>
  <div class="card">
    <div class="header">
      <h2>Digital Business Card</h2>
    </div>
    <div class="content">
      <!-- Profile Photo with Optimized Loading -->
      <picture>
        <source srcset="assets/images/profile/Photo.webp" type="image/webp">
        <img 
          class="photo" 
          src="assets/images/profile/Photo.webp" 
          alt="Midhun Soman Profile Photo"
          loading="lazy"
          decoding="async">
      </picture>
      
      <!-- Company Logo -->
      <picture>
        <source srcset="rareminds_logo.svg" type="image/svg+xml">
        <img 
          class="logo" 
          src="rareminds_logo.svg" 
          alt="Rareminds Logo"
          loading="lazy"
          decoding="async">
      </picture>
      
      <h2>Midhun Soman</h2>
      <p><b>Business Development Executive</b><br>Rareminds</p>
      
      <!-- Action Buttons -->
      <div class="button-group">
        <a class="btn btn-call" href="tel:+918139838762" title="Call me">
          📞 Call
        </a>
        <a class="btn btn-whatsapp" href="https://wa.me/918139838762" target="_blank" rel="noopener noreferrer" title="Message on WhatsApp">
          💬 WhatsApp
        </a>
        <a class="btn btn-email" href="mailto:midhunsoman24@gmail.com" title="Send email">
          📧 Email
        </a>
      </div>
      
      <div class="button-group">
        <a class="btn btn-linkedin" href="https://www.linkedin.com/in/midhun-soman-10984832b" target="_blank" rel="noopener noreferrer" title="Visit LinkedIn">
          💼 LinkedIn
        </a>
        <a class="btn btn-website" href="https://www.rareminds.in" target="_blank" rel="noopener noreferrer" title="Visit Rareminds Website">
          🌐 Rareminds
        </a>
        <a class="btn btn-certificate" href="https://skillpassport.rareminds.in" target="_blank" rel="noopener noreferrer" title="View Skill Passport">
          🎓 Skill Passport
        </a>
      </div>
    </div>
  </div>
  
  <!-- Preload critical images -->
  <link rel="preload" as="image" href="assets/images/profile/Photo.webp" type="image/webp">
</body>
</html>
